<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function postData(){
            const data = {name: 'Microprocessor Book 8085', description: '8085 and 8086 detail information',created_at: '2082-02-10'};

            const options = {
                method: 'POST',
                headers: {
                    'content-type': 'application/json'
                },
                body: JSON.stringify(data)
            };

            // console.log(options);

            fetch("http://localhost/restapi/create.php", options)
                .then(response => response.json())
                .then(data=> {console.log(data)});
        }
        postData();
    </script>
</body>
