<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table example 1</title>
</head>
<body>
    <h1>Table attributes</h1>
    <ul>
        <li>border</li>
        <li>cellspacing</li>
        <li>cellpadding</li>
        <li>colspan</li>
        <li>rowspan</li>
        <li>width</li>
        <li>class</li>
        <li>id</li>
    </ul>
    <table border="1" cellpadding="6" cellspacing="10" >
        <tr>
            <td><strong>Name</strong></td>
            <td><strong>address</strong></td>
            <td><strong>Phone</strong></td>
        </tr>
        <tr>
            <td colspan="2">Jhon Doe</td>
            
            <td>987987978</td>
        </tr>
        <tr>
            <td>foo</td>
            <td>Dhangadhi</td>
            <td>98798787987</td>
        </tr>
    </table>

    <h2>Clasification of table</h2>
    <table border="1" cellspacing="0">
        <thead>
            <tr>
                <th>Name</th>
                <th>Address</th>
                <th>Phone</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="2">Jhon Doe</td>
                
                <td>987987978</td>
            </tr>
            <tr>
                <td>foo</td>
                <td>Dhangadhi</td>
                <td>98798787987</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>Name</th>
                <th>Address</th>
                <th>Phone</th>
            </tr>
        </tfoot>
    </table>

</body>
</html>
