<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copmplex table</title>
</head>
<body>
    <table border="1">
        <tr>
            <th rowspan="2">Day</th>
            <th colspan="2">Scheduled</th>
            <th rowspan="2">Time</th>
        </tr>
        <tr>
            <th>Start time</th>
            <th>End time</th>
        </tr>
        <tr>
            <td>Monday</td>
            <td>12:00</td>
            <td>1:00</td>
            <td>1</td>
        </tr>
        <tr>
            <td>Tuesday</td>
            <td>1:00</td>
            <td>3:00</td>
            <td>2</td>
        </tr>
        <tr>
            <td>Wednesday</td>
            <td>4:00</td>
            <td>5:00</td>
            <td>1</td>
        </tr>
    </table>
</body>
</html>
